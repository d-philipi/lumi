<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lumi — a bright little AI companion. A creative chatbot interface built with pure HTML, CSS and JavaScript." />
  <meta name="theme-color" content="#0e1116" />
  <title>Lumi · Your bright companion</title>
  <link rel="icon" type="image/png" href="assets/images/lumi-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar" aria-label="Conversation navigation">
      <div class="sidebar__top">
        <button class="icon-btn sidebar__toggle" id="sidebarToggle" aria-label="Collapse sidebar" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="brand">
          <img src="assets/images/lumi-logo.png" alt="" class="brand__logo" />
          <span class="brand__name">Lumi</span>
        </div>
      </div>

      <button class="new-chat" id="newChatBtn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <span class="label">New chat</span>
      </button>

      <div class="search">
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" class="search__input" placeholder="Search chats" aria-label="Search chats" autocomplete="off" />
      </div>

      <nav class="chats" aria-label="Recent chats">
        <p class="chats__heading"><span class="label">Recent</span></p>
        <ul class="chats__list" id="chatList"></ul>
        <p class="chats__empty" id="chatsEmpty" hidden>No chats match your search.</p>
      </nav>

      <div class="sidebar__bottom">
        <button class="account" id="accountBtn" aria-haspopup="true">
          <img src="assets/images/user-avatar.png" alt="" class="account__avatar" />
          <span class="account__info">
            <span class="account__name">Alex Rivera</span>
            <span class="account__plan">Free · Sunrise plan</span>
          </span>
          <svg class="account__chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="account__menu" id="accountMenu" role="menu" hidden>
          <button role="menuitem" data-action="theme">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
            <span id="themeLabel">Switch to light</span>
          </button>
          <button role="menuitem" data-action="settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3.5 14H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 3.5V3a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 4.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.1 1.5H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1.1z"/></svg>
            <span>Settings</span>
          </button>
          <button role="menuitem" data-action="signout">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            <span>Sign out</span>
          </button>
        </div>
      </div>
    </aside>

    <div class="scrim" id="scrim" hidden></div>

    <!-- ============ MAIN ============ -->
    <main class="main" id="main">
      <header class="topbar">
        <button class="icon-btn topbar__menu" id="menuBtn" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h1 class="topbar__title" id="topbarTitle">Lumi</h1>
        <button class="icon-btn topbar__theme" id="themeBtn" aria-label="Toggle theme">
          <svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </header>

      <section class="view" id="view" aria-live="polite">
        <!-- Welcome (hero) -->
        <div class="welcome" id="welcome">
          <div class="welcome__glow" aria-hidden="true"></div>
          <img src="assets/images/lumi-logo.png" alt="" class="welcome__logo" />
          <h2 class="welcome__greeting" id="greeting">Hello, Alex</h2>
          <p class="welcome__sub">How can I brighten your day?</p>
          <div class="suggestions" id="suggestions">
            <button class="suggestion" data-prompt="Write a short poem about the morning sun">
              <span class="suggestion__icon" data-i="pen"></span>
              <span>Write a short poem about the morning sun</span>
            </button>
            <button class="suggestion" data-prompt="Explain how rainbows form like I'm five">
              <span class="suggestion__icon" data-i="bulb"></span>
              <span>Explain how rainbows form like I&apos;m five</span>
            </button>
            <button class="suggestion" data-prompt="Give me 3 creative names for a coffee shop">
              <span class="suggestion__icon" data-i="spark"></span>
              <span>3 creative names for a coffee shop</span>
            </button>
            <button class="suggestion" data-prompt="Plan a relaxing weekend in the mountains">
              <span class="suggestion__icon" data-i="map"></span>
              <span>Plan a relaxing weekend in the mountains</span>
            </button>
          </div>
        </div>

        <!-- Message thread -->
        <div class="thread" id="thread" hidden></div>
      </section>

      <!-- Composer -->
      <footer class="composer">
        <form class="composer__form" id="composerForm">
          <button type="button" class="icon-btn composer__attach" aria-label="Add attachment" title="Add attachment">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.48-8.49"/></svg>
          </button>
          <textarea id="composerInput" class="composer__input" rows="1" placeholder="Message Lumi…" aria-label="Message Lumi"></textarea>
          <button type="submit" class="composer__send" id="sendBtn" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </form>
        <p class="composer__hint">Lumi can make mistakes — but it always means well. Press <kbd>Enter</kbd> to send.</p>
      </footer>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
